packages:
  - 'apps/*'
  - 'packages/*'

# 의존성 버전 단일 관리(catalog). 각 package.json은 "catalog:"로 참조한다.
# 버전 변경은 여기 한 곳만 수정 후 `pnpm install`.
catalog:
  # framework / runtime
  next: 16.2.6
  react: 19.2.4
  react-dom: 19.2.4

  # styling
  tailwindcss: ^4
  '@tailwindcss/postcss': ^4

  # state
  jotai: ^2.20.0

  # backend (gymlog) — auth / firestore / fcm
  firebase: ^12.15.0

  # drag & drop (gymlog 순서 조정)
  '@dnd-kit/core': ^6.3.1
  '@dnd-kit/sortable': ^10.0.0
  '@dnd-kit/utilities': ^3.2.2

  # 3d (life-simulation 앱)
  three: 0.184.0
  '@react-three/fiber': 9.6.1
  '@react-three/drei': 10.7.7
  '@react-three/postprocessing': 3.0.4
  postprocessing: 6.39.1
  '@types/three': 0.184.1

  # tooling
  typescript: ^5
  tsx: ^4.19.2
  prettier: ^3.4.2
  eslint: ^9
  eslint-config-next: 16.2.6

  # lint / format 공유 설정(@repo/eslint-config, @repo/prettier-config)에서 사용
  '@typescript-eslint/parser': ^8.60.0
  eslint-config-prettier: ^10.1.8
  eslint-import-resolver-typescript: ^3.10.1
  eslint-plugin-boundaries: ^6.0.2
  eslint-plugin-import-x: ^4.16.2
  eslint-plugin-prettier: ^5.5.6
  prettier-plugin-organize-imports: ^4.3.0

  # awesome-sudoku 편입 lint 툴체인 (공유 eslint-config로 이전 전까지 유지)
  '@eslint/eslintrc': ^3
  '@eslint/js': ^9.27.0
  '@next/bundle-analyzer': ^16.1.6
  '@next/eslint-plugin-next': ^16.1.6
  '@vercel/style-guide': ^6.0.0
  eslint-config-turbo: ^2.5.3
  eslint-plugin-only-warn: ^1.1.0
  globals: ^16.1.0
  typescript-eslint: ^8.32.1

  # test (vitest)
  vitest: ^4.1.6
  '@vitejs/plugin-react': ^4.5.0
  jsdom: ^26.1.0
  '@testing-library/jest-dom': ^6.6.3
  '@testing-library/react': ^16.3.0
  '@testing-library/user-event': ^14.6.1

  # types (Node 24 고정 — .nvmrc)
  '@types/node': ^24.0.0
  '@types/react': ^19
  '@types/react-dom': ^19

  # ui utilities (shared across apps)
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  class-variance-authority: ^0.7.1
  lucide-react: ^0.563.0
  radix-ui: ^1.4.3
  '@radix-ui/react-checkbox': ^1.3.3
  framer-motion: ^12.33.0
  next-themes: ^0.4.6

  # content / markdown
  react-markdown: ^10.1.0
  rehype-highlight: ^7.0.2
  remark-gfm: ^4.0.1
  highlight.js: ^11.11.1

  # icons
  react-icons: ^5.5.0

  # backend / data
  '@supabase/ssr': ^0.8.0
  '@supabase/supabase-js': ^2.106.1
  '@tanstack/react-query': ^5.100.14

  # analytics
  '@vercel/analytics': ^2.0.1

  # i18n / locale
  korean-lunar-calendar: ^0.3.6

  # image processing
  sharp: ^0.34.5

  # astro (dansoon)
  astro: ^6.1.9
  '@astrojs/check': ^0.9.4
  '@astrojs/react': ^4.2.0
  '@astrojs/rss': ^4.0.10
  '@astrojs/sitemap': ^3.2.1
  '@tailwindcss/typography': ^0.5.15
  '@tailwindcss/vite': ^4.1.0
  prettier-plugin-astro: ^0.14.1

  # ui (fe-deep)
  shadcn: ^3.8.4
  tw-animate-css: ^1.4.0

catalogs:
  fb11:
    firebase: ^11.9.1

