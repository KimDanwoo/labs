name: Dansoon Daily Tech News

on:
  schedule:
    - cron: '0 1 * * 1-6' # 월~토 오전 10시 KST (UTC 01:00)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set timezone to KST
        run: |
          sudo timedatectl set-timezone Asia/Seoul
          echo "Current time: $(date)"

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Setup Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests google-generativeai

      - name: Fetch tech news
        working-directory: apps/dansoon
        run: python scripts/fetch_tech_news.py ${{ steps.date.outputs.date }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: '✨ feat(${{ steps.date.outputs.date }}): 오늘의 테크 뉴스 추가'
          title: '✨ feat(${{ steps.date.outputs.date }}): 오늘의 테크 뉴스 추가'
          body: |
            ## 📋 변경사항
            - 날짜: ${{ steps.date.outputs.date }}
            - 파일: `apps/dansoon/contents/tech/${{ steps.date.outputs.date }}-tech-news/index.md`
            - Hacker News Top 5 수집 및 Gemini 한국어 요약
          add-paths: |
            apps/dansoon/contents/
          branch: 'feature/${{ steps.date.outputs.date }}-tech-news'
          base: 'main'

      - name: Auto-merge Pull Request
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: |
          for i in 1 2 3 4 5; do
            gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" \
              --squash --auto --delete-branch && break || sleep 10
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
