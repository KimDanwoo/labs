name: Dansoon Daily Tech News

on:
  schedule:
    - cron: '0 1 * * 1-6' # 월~토 오전 10시 KST (UTC 01:00)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set timezone to KST
        run: |
          sudo timedatectl set-timezone Asia/Seoul
          echo "Current time: $(date)"

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Setup Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests google-generativeai

      - name: Fetch tech news
        working-directory: apps/dansoon
        run: python scripts/fetch_tech_news.py ${{ steps.date.outputs.date }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit, open PR, and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="feature/${{ steps.date.outputs.date }}-tech-news"
          TITLE='✨ feat(${{ steps.date.outputs.date }}): 오늘의 테크 뉴스 추가'
          git add apps/dansoon/contents/
          if git diff --cached --quiet; then
            echo "생성된 변경이 없어 종료합니다."
            exit 0
          fi
          git switch -c "$BRANCH"
          git commit -m "$TITLE"
          git push -f origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" --title "$TITLE" --body '자동 생성된 테크 뉴스입니다.'
          gh pr merge "$BRANCH" --squash --delete-branch
