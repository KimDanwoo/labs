name: Dansoon Weekly Bestseller

on:
  schedule:
    - cron: '0 1 * * 1' # 매주 월요일 오전 10시 KST (UTC 01:00)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set timezone to KST
        run: |
          sudo timedatectl set-timezone Asia/Seoul
          echo "Current time: $(date)"

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Setup Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests google-genai playwright

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/dansoon-weekly-bestseller.yml') }}

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Fetch bestseller data
        working-directory: apps/dansoon
        run: python scripts/fetch_bestseller.py ${{ steps.date.outputs.date }}
        env:
          ALADIN_TTB_KEY: ${{ secrets.ALADIN_TTB_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push branch
        run: |
          BRANCH="feature/${{ steps.date.outputs.date }}-bestseller"
          git add apps/dansoon/contents/
          if git diff --cached --quiet; then
            echo "생성된 변경이 없어 종료합니다."
            exit 0
          fi
          git switch -c "$BRANCH"
          git commit -m '✨ feat(${{ steps.date.outputs.date }}): 주간 베스트셀러 추가'
          git push -f origin "$BRANCH"
          {
            echo "### 🌱 브랜치 푸시 완료"
            echo ""
            echo "PR 열기: https://github.com/${{ github.repository }}/pull/new/$BRANCH"
          } >> "$GITHUB_STEP_SUMMARY"
