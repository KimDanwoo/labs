name: Dansoon Weekly Webnovel

on:
  schedule:
    - cron: '0 17 * * 0' # 매주 월요일 새벽 2시 KST (일요일 UTC 17:00)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set timezone to KST
        run: |
          sudo timedatectl set-timezone Asia/Seoul
          echo "Current time: $(date)"

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Setup Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install curl_cffi google-genai playwright

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/dansoon-weekly-webnovel.yml') }}

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Fetch webnovel data
        working-directory: apps/dansoon
        run: python scripts/fetch_webnovel.py ${{ steps.date.outputs.date }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit, open PR, and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="feature/${{ steps.date.outputs.date }}-webnovel"
          TITLE='✨ feat(${{ steps.date.outputs.date }}): 주간 웹소설 베스트셀러 추가'
          git add apps/dansoon/contents/
          if git diff --cached --quiet; then
            echo "생성된 변경이 없어 종료합니다."
            exit 0
          fi
          git switch -c "$BRANCH"
          git commit -m "$TITLE"
          git push -f origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" --title "$TITLE" --body '자동 생성된 주간 웹소설 베스트셀러입니다.'
          gh pr merge "$BRANCH" --squash --delete-branch
